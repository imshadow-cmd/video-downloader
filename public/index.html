<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VaultDL — Universal Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #7c6af7;
      --accent2: #f76a8c;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --success: #4ade80;
      --error: #f87171;
      --radius: 12px;
      --font: 'Syne', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Gradient orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 600px; height: 600px; background: var(--accent); top: -200px; left: -150px; animation: drift 18s ease-in-out infinite alternate; }
    .orb-2 { width: 500px; height: 500px; background: var(--accent2); bottom: -150px; right: -100px; animation: drift 22s ease-in-out infinite alternate-reverse; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.05); }
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 4rem 1.5rem 6rem;
    }

    header { text-align: center; margin-bottom: 3.5rem; }

    .logo-text {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1.2rem;
    }

    .url-input {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      padding: 0.75rem 1rem;
      outline: none;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0.75rem 1.4rem;
      border-radius: var(--radius);
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #9b59f0);
      color: #fff;
    }

    .format-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
    }

    .format-card {
      cursor: pointer;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem;
      text-align: center;
    }

    .format-card.active {
      border-color: var(--accent);
      background: rgba(124, 106, 247, 0.08);
    }

    #meta-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .meta-inner {
      display: flex;
      gap: 1.2rem;
      align-items: center;
    }

    .meta-thumb {
      width: 140px;
      border-radius: 8px;
    }

    #status-box {
      display: none;
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 0.82rem;
      border-left: 3px solid var(--accent);
      background: rgba(124, 106, 247, 0.07);
    }

    .spin {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 520px) {
      .format-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="wrapper">
    <header>
      <div class="logo-text">VaultDL</div>
      <p style="color: var(--muted)">Universal video, audio & image downloader</p>
    </header>

    <div class="card">
      <div class="input-row">
        <input type="url" id="url-input" class="url-input" placeholder="Paste link here..." />
        <button class="btn btn-primary" id="fetch-btn" onclick="fetchMeta()">Fetch</button>
      </div>

      <div class="format-row">
        <div class="format-card active" onclick="selectFormat('mp4_hd', this)">
          <div style="font-size: 1.2rem">🎬</div>
          <div style="font-weight: 700">MP4 HD</div>
          <div style="font-size: 0.7rem; color: var(--muted)">1080p+ Quality</div>
        </div>
        <div class="format-card" onclick="selectFormat('mp4_standard', this)">
          <div style="font-size: 1.2rem">📱</div>
          <div style="font-weight: 700">MP4</div>
          <div style="font-size: 0.7rem; color: var(--muted)">Up to 720p</div>
        </div>
        <div class="format-card" onclick="selectFormat('mp3', this)">
          <div style="font-size: 1.2rem">🎵</div>
          <div style="font-weight: 700">MP3</div>
          <div style="font-size: 0.7rem; color: var(--muted)">Audio Only</div>
        </div>
        <div class="format-card" onclick="selectFormat('image', this)">
          <div style="font-size: 1.2rem">🖼️</div>
          <div style="font-weight: 700">IMAGE</div>
          <div style="font-size: 0.7rem; color: var(--muted)">Original JPG</div>
        </div>
      </div>
    </div>

    <div id="meta-panel">
      <div class="meta-inner">
        <img id="meta-thumb" class="meta-thumb" src="" />
        <div style="flex: 1">
          <div id="meta-title" style="font-weight: 700; margin-bottom: 1rem;">Title</div>
          <button class="btn btn-primary" style="width: 100%" onclick="startDownload()">⬇ Download Now</button>
        </div>
      </div>
    </div>

    <div id="status-box"></div>
  </div>

  <script>
    let selectedFormat = 'mp4_hd', metaTitle = 'download', currentUrl = '';

    function selectFormat(fmt, el) {
      selectedFormat = fmt;
      document.querySelectorAll('.format-card').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
    }

    function setStatus(msg, type = 'info') {
      const box = document.getElementById('status-box');
      box.style.display = 'block';
      box.textContent = msg;
    }

    async function fetchMeta() {
      const url = document.getElementById('url-input').value.trim();
      if (!url) return;
      
      const btn = document.getElementById('fetch-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spin"></span>';
      setStatus("⏳ check the link...");

      try {
        const res = await fetch('/api/metadata', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        currentUrl = url;
        metaTitle = data.title;
        document.getElementById('meta-thumb').src = data.thumbnail;
        document.getElementById('meta-title').textContent = data.title;
        document.getElementById('meta-panel').style.display = 'block';
        setStatus("✓ link foundd!");
      } catch (err) {
        setStatus("⚠ Error: " + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Fetch';
      }
    }

    function startDownload() {
      if (!currentUrl) return;
      setStatus("⏳ Connecting to stream... please check your browser downloads.");
      const params = new URLSearchParams({ url: currentUrl, format: selectedFormat, title: metaTitle });
      window.location.href = `/api/download?${params.toString()}`;
    }
  </script>
</body>
</html>
